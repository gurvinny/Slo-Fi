user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    sendfile           on;
    keepalive_timeout  65;

    # Gzip — text/html is omitted here because nginx includes it by default
    gzip             on;
    gzip_comp_level  5;
    gzip_min_length  1024;
    gzip_types       text/css application/javascript application/json image/svg+xml application/font-woff2 image/x-icon;
    gzip_vary        on;

    # Cache-Control per asset type.
    # Regex values containing { must be quoted to avoid nginx treating { as a
    # block boundary.  Vite hashes JS/CSS filenames so they can be cached forever.
    # PWA shell files must never be cached so updates reach clients immediately.
    map $uri $cache_control {
        "~\-[a-zA-Z0-9_-]{7,}\.(js|css)$"             "public, max-age=31536000, immutable";
        "~^/(index\.html|sw\.js|manifest\.json)?$"     "no-cache, no-store, must-revalidate";
        default                                         "public, max-age=86400";
    }

    server {
        listen       5173;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # Security headers — mirrors public/_headers (Netlify format) so the
        # same policy is enforced in both Netlify and Docker deployments.
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;
        add_header X-Frame-Options          "DENY"        always;
        add_header X-Content-Type-Options   "nosniff"     always;
        add_header Referrer-Policy          "no-referrer" always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), display-capture=()" always;
        add_header Cross-Origin-Opener-Policy   "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Cache-Control            $cache_control always;

        # SPA routing — serve static files when they exist; fall back to
        # index.html so the client-side router handles all other paths.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
