<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Deep space base -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#04040e"/>
      <stop offset="45%"  stop-color="#07071a"/>
      <stop offset="100%" stop-color="#030310"/>
    </linearGradient>

    <!-- Aurora bloom — purple left -->
    <radialGradient id="aurora1" cx="280" cy="110" r="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="#a855f7" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- Aurora bloom — cyan right -->
    <radialGradient id="aurora2" cx="980" cy="160" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="55%"  stop-color="#0e7490" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>

    <!-- Aurora bloom — magenta center hint -->
    <radialGradient id="aurora3" cx="620" cy="150" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#d946ef" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0"/>
    </radialGradient>

    <!-- Title gradient — purple → pink → cyan -->
    <linearGradient id="titleGrad" x1="228" y1="0" x2="570" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c084fc"/>
      <stop offset="45%"  stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Hex logo gradient — purple to cyan -->
    <linearGradient id="hexGrad" x1="74" y1="52" x2="206" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Waveform gradient -->
    <linearGradient id="waveGrad" x1="650" y1="0" x2="1170" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="12%"  stop-color="#a855f7" stop-opacity="0.95"/>
      <stop offset="48%"  stop-color="#e879f9" stop-opacity="0.9"/>
      <stop offset="82%"  stop-color="#06b6d4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>

    <!-- Waveform glow (blurred duplicate) -->
    <linearGradient id="waveGlow" x1="650" y1="0" x2="1170" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="12%"  stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="50%"  stop-color="#e879f9" stop-opacity="0.35"/>
      <stop offset="88%"  stop-color="#06b6d4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>

    <!-- Bottom separator gradient -->
    <linearGradient id="sepGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="75%"  stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>

    <!-- Underline accent gradient -->
    <linearGradient id="underlineGrad" x1="228" y1="0" x2="560" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#06b6d4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="blur3">  <feGaussianBlur stdDeviation="3"/>  </filter>
    <filter id="blur6">  <feGaussianBlur stdDeviation="6"/>  </filter>
    <filter id="blur10"> <feGaussianBlur stdDeviation="10"/> </filter>
    <filter id="blur16"> <feGaussianBlur stdDeviation="16"/> </filter>

  </defs>

