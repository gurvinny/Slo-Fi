<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Professional-grade audio slow-down tool with convolution reverb. Runs entirely in your browser — no uploads, no tracking." />
    <meta name="theme-color" content="#080810" />
    <title>Slo-Fi — Your Browser Is the Studio</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="header-inner">
          <div class="logo">
            <svg class="logo-icon" width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
              <polygon points="14,2 26,8 26,20 14,26 2,20 2,8" fill="none" stroke="#9b6dff" stroke-width="1.5"/>
              <polygon points="14,7 21,11 21,17 14,21 7,17 7,11" fill="none" stroke="#9b6dff" stroke-width="1" opacity="0.5"/>
              <circle cx="14" cy="14" r="2.5" fill="#9b6dff"/>
            </svg>
            <span class="logo-text">Slo‑Fi</span>
          </div>
          <p class="tagline">professional audio time-stretcher</p>
        </div>
      </header>

      <main class="main">
        <!-- Drop Zone -->
        <div id="dropzone" class="dropzone" role="button" tabindex="0" aria-label="Drop audio file or click to browse">
          <div class="dropzone-content">
            <svg class="dropzone-icon" width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M24 4 L44 14 L44 34 L24 44 L4 34 L4 14 Z" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.4"/>
              <path d="M24 14 L34 19 L34 29 L24 34 L14 29 L14 19 Z" stroke="currentColor" stroke-width="1" fill="none" opacity="0.3"/>
              <path d="M20 24 L24 20 L28 24 M24 20 L24 32" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <p class="dropzone-title">Drop your audio file here</p>
            <p class="dropzone-hint">or click to browse &nbsp;·&nbsp; mp3 &nbsp;wav &nbsp;flac &nbsp;ogg &nbsp;aac</p>
          </div>
          <input type="file" id="fileInput" accept=".mp3,.wav,.flac,.ogg,.aac,audio/*" aria-hidden="true" tabindex="-1" />
        </div>

        <!-- Player (hidden until file loaded) -->
        <div id="player" class="player" aria-hidden="true">
          <!-- Track info -->
          <div class="track-info">
            <div class="track-name" id="trackName">—</div>
            <div class="track-meta" id="trackMeta">—</div>
          </div>

          <!-- Waveform -->
          <div class="waveform-wrap">
            <canvas id="waveform" class="waveform" role="slider" aria-label="Seek position" tabindex="0"></canvas>
          </div>

          <!-- Time -->
          <div class="time-row">
            <span class="time-current" id="currentTime">0:00</span>
            <span class="time-total" id="duration">0:00</span>
          </div>

          <!-- Transport -->
          <div class="transport">
            <button id="stopBtn" class="btn btn-icon" title="Stop (s)" aria-label="Stop">
              <svg width="16" height="16" viewBox="0 0 16 16"><rect x="3" y="3" width="10" height="10" fill="currentColor" rx="1"/></svg>
            </button>
            <button id="playPauseBtn" class="btn btn-play" title="Play / Pause (Space)" aria-label="Play">
              <svg id="iconPlay" width="22" height="22" viewBox="0 0 22 22"><polygon points="6,3 19,11 6,19" fill="currentColor"/></svg>
              <svg id="iconPause" width="22" height="22" viewBox="0 0 22 22" style="display:none"><rect x="4" y="3" width="5" height="16" fill="currentColor" rx="1"/><rect x="13" y="3" width="5" height="16" fill="currentColor" rx="1"/></svg>
            </button>
            <button id="rewindBtn" class="btn btn-icon" title="Rewind 5s (←)" aria-label="Rewind 5 seconds">
              <svg width="18" height="18" viewBox="0 0 18 18"><path d="M9 2 A7 7 0 1 0 4 5.5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/><polygon points="1,3 7,3 4,7" fill="currentColor"/><text x="6" y="12" font-size="5" fill="currentColor" font-family="system-ui">5s</text></svg>
            </button>
          </div>

          <!-- Controls grid -->
          <div class="controls">
            <div class="control-group">
              <div class="control-header">
                <label for="speedSlider">Speed</label>
                <span class="value-badge" id="speedValue">1.00×</span>
              </div>
              <input type="range" id="speedSlider" class="slider" min="25" max="100" value="100" step="1" aria-label="Playback speed" />
              <div class="slider-ticks">
                <span>0.25×</span>
                <span>0.50×</span>
                <span>0.75×</span>
                <span>1.00×</span>
              </div>
            </div>

            <div class="control-group">
              <div class="control-header">
                <label for="reverbSlider">Reverb Mix</label>
                <span class="value-badge" id="reverbValue">20%</span>
              </div>
              <input type="range" id="reverbSlider" class="slider slider--teal" min="0" max="100" value="20" step="1" aria-label="Reverb wet/dry mix" />
            </div>

            <div class="control-group">
              <div class="control-header">
                <label for="decaySlider">Decay</label>
                <span class="value-badge" id="decayValue">2.5s</span>
              </div>
              <input type="range" id="decaySlider" class="slider slider--teal" min="5" max="80" value="25" step="1" aria-label="Reverb decay time" />
            </div>

            <div class="control-group">
              <div class="control-header">
                <label for="roomSlider">Room Size</label>
                <span class="value-badge" id="roomValue">50%</span>
              </div>
              <input type="range" id="roomSlider" class="slider slider--teal" min="1" max="100" value="50" step="1" aria-label="Reverb room size" />
            </div>

            <div class="control-group">
              <div class="control-header">
                <label for="volumeSlider">Volume</label>
                <span class="value-badge" id="volumeValue">80%</span>
              </div>
              <input type="range" id="volumeSlider" class="slider slider--dim" min="0" max="100" value="80" step="1" aria-label="Master volume" />
            </div>
          </div>
        </div>
      </main>

      <footer class="footer">
        <p>All audio stays on your device &nbsp;·&nbsp; zero uploads &nbsp;·&nbsp; zero tracking</p>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
